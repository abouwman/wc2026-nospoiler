<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1"></meta>
<title>World Cup No Spoiler</title>
<link rel="preconnect" href="https://fonts.googleapis.com"></link>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"></link>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"></link>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Archivo', 'Helvetica Neue', sans-serif; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  select { font: inherit; color: inherit; }

  /* ===================== Skin tokens ===================== */
  .skin-pitch.mode-light {
    --bg:#f6f5f0; --surface:#ffffff; --surface2:#efeee8; --ink:#1b1d18; --muted:#70746a;
    --line:#e3e2d8; --accent:#2f7d52; --accent-ink:#ffffff; --radius:14px;
    --card-border:1px solid var(--line); --card-shadow:0 1px 2px rgba(27,29,24,0.05);
    --display-font:'Archivo'; --display-weight:800; --display-transform:none; --display-tracking:-0.02em;
  }
  .skin-pitch.mode-dark {
    --bg:#141613; --surface:#1d201c; --surface2:#232723; --ink:#eceee6; --muted:#989e90;
    --line:#2d322c; --accent:#6fbd92; --accent-ink:#10271a; --radius:14px;
    --card-border:1px solid var(--line); --card-shadow:0 1px 2px rgba(0,0,0,0.3);
    --display-font:'Archivo'; --display-weight:800; --display-transform:none; --display-tracking:-0.02em;
  }
  .skin-broadcast.mode-light {
    --bg:#eef0f5; --surface:#ffffff; --surface2:#e4e8f0; --ink:#0f1626; --muted:#5d6680;
    --line:#d8dde8; --accent:#2563eb; --accent-ink:#ffffff; --radius:10px;
    --card-border:1px solid var(--line); --card-shadow:0 2px 8px rgba(15,22,38,0.07);
    --display-font:'Barlow Condensed'; --display-weight:700; --display-transform:uppercase; --display-tracking:0.02em;
  }
  .skin-broadcast.mode-dark {
    --bg:#0a0d15; --surface:#131826; --surface2:#1a2133; --ink:#e9edf8; --muted:#8b93ab;
    --line:#242c42; --accent:#5b8cff; --accent-ink:#0a0d15; --radius:10px;
    --card-border:1px solid var(--line); --card-shadow:0 4px 16px rgba(0,0,0,0.4);
    --display-font:'Barlow Condensed'; --display-weight:700; --display-transform:uppercase; --display-tracking:0.02em;
  }
  .skin-poster.mode-light {
    --bg:#f5eede; --surface:#fdf8ec; --surface2:#ece2cc; --ink:#211b10; --muted:#79705c;
    --line:#211b10; --accent:#d4502a; --accent-ink:#fdf8ec; --radius:10px;
    --card-border:2px solid var(--ink); --card-shadow:5px 5px 0 var(--ink);
    --display-font:'Archivo Black'; --display-weight:400; --display-transform:uppercase; --display-tracking:0;
  }
  .skin-poster.mode-dark {
    --bg:#1a150d; --surface:#241d12; --surface2:#2d2517; --ink:#f2e9d5; --muted:#a3987f;
    --line:#f2e9d5; --accent:#e8602f; --accent-ink:#1a150d; --radius:10px;
    --card-border:2px solid var(--ink); --card-shadow:5px 5px 0 rgba(242,233,213,0.55);
    --display-font:'Archivo Black'; --display-weight:400; --display-transform:uppercase; --display-tracking:0;
  }

  .app { min-height: 100vh; background: var(--bg); color: var(--ink); transition: background 0.25s, color 0.25s; }
  .display { font-family: var(--display-font), 'Archivo', sans-serif; font-weight: var(--display-weight);
             text-transform: var(--display-transform); letter-spacing: var(--display-tracking); }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .shell { max-width: 1180px; margin: 0 auto; padding: 0 24px 80px; }

  /* ===================== Header ===================== */
  .header { position: sticky; top: 0; z-index: 40; background: var(--bg); border-bottom: 1px solid var(--line); }
  .skin-poster .header { border-bottom-width: 2px; border-bottom-color: var(--ink); }
  .header-inner { max-width: 1180px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .wordmark { display: flex; align-items: baseline; gap: 10px; margin-right: auto; }
  .wordmark .mark { font-size: 24px; line-height: 1; }
  .wordmark .mark .accent { color: var(--accent); }
  .skin-broadcast .wordmark .mark { font-size: 28px; }
  .wordmark .sub { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .seg { display: flex; gap: 2px; background: var(--surface2); border-radius: 999px; padding: 3px; }
  .skin-poster .seg { border-radius: 8px; border: 2px solid var(--ink); background: var(--surface); }
  .seg button { padding: 5px 13px; border-radius: 999px; font-size: 12.5px; font-weight: 600; color: var(--muted); }
  .skin-poster .seg button { border-radius: 5px; }
  .seg button.on { background: var(--ink); color: var(--bg); }
  .seg button:not(.on):hover { color: var(--ink); }
  .seg-label { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-right: 6px; }
  .seg-wrap { display: flex; align-items: center; }

  /* ===================== Tabs + filters ===================== */
  .toolbar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 22px 0 8px; }
  .tabs { display: flex; gap: 8px; margin-right: auto; }
  .tab { padding: 9px 18px; border-radius: 999px; font-weight: 700; font-size: 14px; color: var(--muted); background: var(--surface2); }
  .skin-poster .tab { border-radius: 8px; border: 2px solid transparent; }
  .tab.on { background: var(--accent); color: var(--accent-ink); }
  .skin-poster .tab.on { border-color: var(--ink); box-shadow: 3px 3px 0 var(--ink); }
  .tab:not(.on):hover { color: var(--ink); }
  .filters { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .team-select, .stage-select { background: var(--surface); border: 1px solid var(--line); border-radius: 9px;
    padding: 8px 10px; font-size: 13px; font-weight: 500; max-width: 180px; }
  .skin-poster .team-select, .skin-poster .stage-select { border: 2px solid var(--ink); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 0 4px; }
  .chip { min-width: 34px; height: 30px; display: grid; place-items: center; border-radius: 8px; font-size: 12.5px;
    font-weight: 700; color: var(--muted); background: var(--surface2); padding: 0 8px; }
  .chip.on { background: var(--ink); color: var(--bg); }
  .chip:not(.on):hover { color: var(--ink); }

  /* ===================== Day sections + cards ===================== */
  .day-section { padding-top: 28px; }
  .day-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .day-title { font-size: 21px; }
  .day-count { font-size: 11.5px; color: var(--muted); letter-spacing: 0.06em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 16px; }
  .density-compact .grid { gap: 10px; }

  .card { background: var(--surface); border: var(--card-border); border-radius: var(--radius);
    box-shadow: var(--card-shadow); padding: 16px; display: flex; flex-direction: column; gap: 12px;
    text-align: left; width: 100%; transition: transform 0.12s ease, box-shadow 0.12s ease; position: relative; }
  .density-compact .card { padding: 12px; gap: 9px; }
  .card.playable:hover { transform: translateY(-2px); }
  .skin-poster .card.playable:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--ink); }
  .skin-pitch .card.playable:hover { box-shadow: 0 6px 18px rgba(27,29,24,0.1); }
  .skin-broadcast .card.playable:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.25), 0 0 0 1px var(--accent); }
  .card.upcoming { opacity: 0.62; }
  .card-top { display: flex; align-items: center; gap: 8px; }
  .stage-chip { font-size: 10.5px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .live-chip { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700;
    color: var(--accent-ink); background: var(--accent); border-radius: 999px; padding: 3px 9px; }
  .card-date { margin-left: auto; font-size: 10.5px; color: var(--muted); }

  .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: stretch; gap: 8px; }
  .team-panel { position: relative; min-height: 96px; border-radius: calc(var(--radius) - 6px); display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 5px; padding: 12px 6px;
    color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.4); overflow: hidden; }
  .density-compact .team-panel { min-height: 76px; }
  .skin-poster .team-panel { border: 2px solid var(--ink); border-radius: 6px; }
  .team-panel.tbd { background: var(--surface2); color: var(--muted); text-shadow: none; }
  .panel-flag { font-size: 32px; line-height: 1; }
  .panel-code { font-size: 21px; letter-spacing: 0.02em; }
  .team-panel.tbd .panel-code { font-size: 14px; }
  .panel-label { font-size: 9px; opacity: 0.9; text-align: center; line-height: 1.4; padding: 0 4px; letter-spacing: 0.03em; text-transform: uppercase; }
  .team-names { text-align: center; font-size: 11.5px; color: var(--muted); white-space: pre; overflow: hidden; text-overflow: ellipsis; }
  .vs { font-size: 12px; color: var(--muted); font-weight: 700; align-self: center; }
  .card-foot { display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--line); padding-top: 11px; }
  .lang-row { display: flex; gap: 7px; width: 100%; }
  .lang-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px;
    border-radius: 9px; background: var(--ink); color: var(--bg); font-weight: 800; font-size: 13.5px; line-height: 1.15;
    transition: background 0.12s, color 0.12s; }
  .lang-btn small { font-weight: 600; font-size: 8.5px; opacity: 0.65; letter-spacing: 0.07em; text-transform: uppercase; }
  .lang-btn.primary, .lang-btn:hover { background: var(--accent); color: var(--accent-ink); }
  .skin-poster .lang-btn { border-radius: 6px; }
  .lang-dots { display: flex; gap: 4px; }
  .lang-dot { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; padding: 3px 7px; border-radius: 6px;
    background: var(--surface2); color: var(--muted); }
  .lock-note { margin-left: auto; font-size: 11.5px; color: var(--muted); }

  /* ===================== Player modal ===================== */
  .modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(8, 9, 8, 0.78); backdrop-filter: blur(6px);
    display: grid; place-items: center; padding: 18px; }
  .modal { width: min(980px, 100%); background: var(--surface); border: var(--card-border); border-radius: var(--radius);
    box-shadow: 0 24px 80px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; }
  .modal-head { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .modal-title { display: flex; align-items: center; gap: 9px; font-size: 17px; }
  .modal-title .mini-flag { font-size: 21px; }
  .modal-sub { font-size: 11.5px; color: var(--muted); }
  .close-btn { margin-left: auto; width: 32px; height: 32px; border-radius: 999px; background: var(--surface2);
    display: grid; place-items: center; font-size: 14px; color: var(--muted); flex: none; }
  .close-btn:hover { color: var(--ink); }
  .video-wrap { position: relative; aspect-ratio: 16 / 9; background: #000; }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .yt-host { position: absolute; inset: 0; }
  .click-layer { position: absolute; inset: 0; z-index: 3; cursor: pointer; }
  .mask-top { position: absolute; top: 0; left: 0; right: 0; height: 64px; z-index: 4; display: flex; align-items: center;
    gap: 8px; padding: 0 16px; background: linear-gradient(to bottom, rgba(5,6,5,0.97) 55%, rgba(5,6,5,0)); color: #9aa093;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; pointer-events: auto; }
  .mask-top .shield { width: 16px; height: 16px; border-radius: 4px; background: var(--accent); flex: none; }
  .ended-overlay, .loading-overlay { position: absolute; inset: 0; z-index: 5; background: rgba(5,6,5,0.94);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: #eceee6; }
  .ended-overlay .big { font-size: 22px; }
  .overlay-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn { padding: 10px 18px; border-radius: 999px; font-weight: 700; font-size: 13.5px; background: var(--surface2); color: var(--ink); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); }
  .skin-poster .btn { border-radius: 8px; border: 2px solid var(--ink); }
  .controls { display: flex; align-items: center; gap: 12px; padding: 12px 16px; flex-wrap: wrap; }
  .ctrl-btn { width: 38px; height: 38px; border-radius: 999px; background: var(--surface2); display: grid;
    place-items: center; font-size: 13px; font-weight: 700; flex: none; }
  .ctrl-btn.play { background: var(--accent); color: var(--accent-ink); width: 44px; height: 44px; }
  .ctrl-btn:hover { filter: brightness(0.96); }
  .skip-label { font-size: 9px; letter-spacing: 0; }
  .progress { flex: 1 1 140px; height: 26px; display: flex; align-items: center; cursor: pointer; min-width: 120px; }
  .progress-track { width: 100%; height: 6px; border-radius: 999px; background: var(--surface2); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.3s linear; }
  .modal-foot { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 0 16px 16px; }
  .source-label { font-size: 11px; color: var(--muted); }
  .no-spoiler-note { font-size: 11px; color: var(--muted); margin-left: auto; }

  /* ===================== Footer ===================== */
  .footer-note { margin-top: 64px; border-top: 1px solid var(--line); padding-top: 20px; font-size: 12px;
    color: var(--muted); line-height: 1.7; max-width: 720px; }
  .footer-note strong { color: var(--ink); }
  .empty-state { padding: 70px 0; text-align: center; color: var(--muted); font-size: 14px; }

  @media (max-width: 640px) {
    .shell { padding: 0 14px 60px; }
    .header-inner { padding: 12px 14px; }
    .wordmark .sub { display: none; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .card { padding: 12px; gap: 9px; }
    .team-panel { min-height: 70px; }
    .panel-flag { font-size: 24px; }
    .panel-code { font-size: 16px; }
    .team-names { display: none; }
    .day-title { font-size: 18px; }
    .modal-head { padding: 11px 13px; }
    .controls { gap: 8px; padding: 10px 12px; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="wc-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wc-components.jsx"></script>
<script type="text/babel" src="wc-app.jsx"></script>
</body>
</html>
