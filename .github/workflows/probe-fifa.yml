name: Probe FIFA (temporary)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/probe-fifa.mjs
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
