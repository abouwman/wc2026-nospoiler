name: Update highlights

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub may run a little less often)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-highlights
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Discover new highlights
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Optional channel-handle overrides (without the @):
          FIFA_HANDLE: ${{ vars.FIFA_HANDLE }}
          FOX_HANDLE: ${{ vars.FOX_HANDLE }}
          NOS_HANDLE: ${{ vars.NOS_HANDLE }}
        run: node scripts/update-highlights.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain src/data/matches.generated.json)" ]]; then
            git config user.name "Claude"
            git config user.email "noreply@anthropic.com"
            git add src/data/matches.generated.json
            git commit -m "chore: auto-update highlights"
            git push
          else
            echo "No changes to commit."
          fi
